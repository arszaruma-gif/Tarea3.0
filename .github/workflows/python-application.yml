name: Python application start

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código fuente
      - name: Descargar codigo fuente
        uses: actions/checkout@v4

      # Configuración del entorno Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 2. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      # 3. Ejecutar pruebas automatizadas
      # (Aquí es donde pytest verificará que tu suma, resta, etc., funcionen bien)
      - name: Test con pytest
        run: |
          pytest

      # 4. Ejecutar la aplicación (Como es una calculadora, se ejecuta y termina)
      - name: Ejecutar la app (Calculadora)
        run: |
          python app.py

      # 5. Simular una fase de despliegue
      - name: Simulacion del deploy
        run: |
          echo "Simulando el despliegue de la calculadora en el entorno de producción..."

      # 6. Autenticarse en GitHub Container Registry
      - name: Login en GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7. Construir la imagen Docker
      - name: Construir la imagen de docker
        run: |
          docker build -t ghcr.io/arszaruma-gif/ejercicio:3.0.0

      # 8. Publicar la imagen generada
      - name: Publicar la imagen
        run: |
          docker push ghcr.io/arszaruma-gif/ejercicio:3.0.0
